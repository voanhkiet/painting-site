{% extends "base.html" %}

{% block content %}

<h2>Upload Painting</h2>

<form method="POST" enctype="multipart/form-data" class="admin-form">

    <input type="text" name="title_en" placeholder="Title (English)" required>
    <input type="text" name="title_vi" placeholder="Tiêu đề (Tiếng Việt)" required>

    <textarea name="description_en" placeholder="Description (English)"></textarea>
    <textarea name="description_vi" placeholder="Mô tả (Tiếng Việt)"></textarea>

    <input type="file" name="image" required>

    <label class="sold-check">
        <input type="checkbox" name="is_sold">
        Mark as SOLD
    </label>
    
    <button type="submit">Upload</button>
</form>

<hr>

<h3>All Paintings</h3>

<div class="gallery">
    {% for p in paintings %}
        <div class="card">

            <img src="{{ p.image }}" alt="">

            <div class="info">
                <strong>{{ p.title_en }}</strong>

                {% if p.is_sold %}
                    <span class="sold-badge">SOLD</span>
                {% else %}
                    <span class="available-badge">Available</span>
                {% endif %}
            </div>

            <form method="POST" action="/admin/delete/{{ p.id }}">
                <button class="delete-btn">Delete</button>
            </form>

        </div>
    {% endfor %}
</div>

{% endblock %}
